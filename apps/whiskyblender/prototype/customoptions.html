    <body class="wb-anniversaries-off">
        <div w3-include-html="wb-header.html"></div>
        <main>
            <section class="wb-first-item">
                <div class="wb-container">
                    <div class="wb-padding">
                        <h1 class="wb-large-heading" id="wb-randomtext">Choose your bottle</h1>
                        <p class="wb-collection-sub" id="wb-options-sub">Now choose how you want to bottle your whisky...</p>
                        <ul class="wb-productsgrid wb-tightergrid" id="custom-grid"></ul>
                    </div>
                </div>
            </section>
            <section class="wb-banded" id="wb-blend-section">
                <div id="wb-blendcode-panel" style="display:none">
                    <div class="wb-container">
                        <div class="wb-padding">
                            <h3 class="wb-small-heading">Safe an' sound</h3>
                            <p>Your whisky is saved. Use the options above to order now, or come back to it any time using your unique blend code below.</p>
                            <div id="wb-blendcode-ui"></div>
                        </div>
                    </div>
                </div>
                <div id="wb-createunique" data-cta="createunique" w3-include-html="wb-cta.html"></div>
            </section>
        </main>
        <div w3-include-html="wb-footer.html"></div>
        <script>
            includeHTML();
        </script>

        <script src="data/custom-products.js"></script>
        <script>
            (function () {
                var blend   = new URLSearchParams(window.location.search).get('blend') || '';
                var suffix  = blend ? '&blend=' + blend : '';
                var grid    = document.getElementById('custom-grid');
                var products = window.WB_CUSTOM_PRODUCTS || {};

                Object.keys(products).forEach(function (handle) {
                    var p    = products[handle];
                    var href = 'custom-product.html?handle=' + handle + suffix;
                    var soldOutClass = p.soldOut ? ' wb-soldout' : '';
                    var badge = p.soldOut ? '<div class="wb-soldoutbadge">Sold out</div>' : '';

                    var li = document.createElement('li');
                    li.className = 'wb-productcell';
                    li.innerHTML =
                        '<div class="wb-productitem' + soldOutClass + '" onclick="location.href=\'' + href + '\'">'
                        + '<div class="wb-productmedia">'
                        + '<div class="wb-productimage"><img src="' + p.image + '" alt="' + p.title + '" /></div>'
                        + '<div class="wb-productbadge">' + badge + '</div>'
                        + '</div>'
                        + '<div class="wb-productcontent"><div class="wb-productinfo">'
                        + '<h3 class="wb-producttitle wb-tiny-heading"><a href="' + href + '">' + p.title + '</a></h3>'
                        + '<div class="wb-productdetails"><div class="wb-productcosts">'
                        + '<div class="wb-product-price">' + p.price + '</div>'
                        + '</div></div>'
                        + '</div></div>'
                        + '</div>';
                    grid.appendChild(li);
                });
            })();
        </script>

        <style>
            .wb-blendcode-ui {
                margin-top: 24px;
            }
.wb-blendcode-box {
                background: #1a1a1a;
                border: 2px solid #1a1a1a;
                border-radius: 6px;
                padding: 14px 24px;
                display: block;
                width: 100%;
                margin: 10px 10px 0 0;
                font-size: 18px;
                font-weight: 700;
                line-height: 160%;
                text-align: center;
            }
            .wb-blendcode-digits {
                color: #ffffff;
                letter-spacing: 0.08em;
            }
@media screen and (min-width: 600px) {
                .wb-blendcode-box {
                    display: inline-flex;
                    width: auto;
                    padding: 16px 28px;
                }
            }
            @media screen and (min-width: 768px) {
                .wb-blendcode-box {
                    font-size: 20px;
                }
            }
        </style>

        <script>
            (function () {
                var blend    = new URLSearchParams(window.location.search).get('blend') || '';
                var hasBlend = !!blend;
                var heading  = document.getElementById('wb-randomtext');
                var sub      = document.getElementById('wb-options-sub');

                if (hasBlend) {
                    var phrases = [
                        "Ya dancer!",
                        "Yaldy!",
                        "Ya wee blender ye!",
                        "Gie's some!",
                        "Gawjus!",
                        "Belter!",
                        "Tasty AF!",
                        "Magic!",
                        "Amazin'!",
                        "Well done!",
                        "Lookin' guid!",
                        "Canny wait!",
                        "Let's get dressed!",
                        "Liquid gold!"
                    ];
                    heading.textContent = phrases[Math.floor(Math.random() * phrases.length)];

                    document.getElementById('wb-blendcode-panel').style.display = '';
                    document.getElementById('wb-createunique').style.display = 'none';

                    // Build share URL: 500ml flat bottle with this blend code
                    var base = window.location.href.replace(/[^\/]*$/, '');
                    var shareUrl = base + 'custom-product.html?handle=500-flat&blend=' + blend;

                    // Render blend code UI
                    var ui = document.getElementById('wb-blendcode-ui');

                    var box = document.createElement('div');
                    box.className = 'wb-blendcode-box';
                    box.innerHTML = '<span class="wb-blendcode-digits">' + blend + '</span>';

                    var actions = document.createElement('div');
                    actions.className = 'wb-buttons';

                    var copyBtn = document.createElement('button');
                    copyBtn.className = 'wb-button wb-primary-button';
                    copyBtn.innerHTML =
                        '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>'
                        + 'Copy';
                    copyBtn.addEventListener('click', function () {
                        navigator.clipboard.writeText(shareUrl).then(function () {
                            copyBtn.innerHTML =
                                '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>'
                                + 'Copied!';
                            setTimeout(function () {
                                copyBtn.innerHTML =
                                    '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>'
                                    + 'Copy';
                            }, 2000);
                        });
                    });
                    actions.appendChild(copyBtn);

                    if (navigator.share) {
                        var shareBtn = document.createElement('button');
                        shareBtn.className = 'wb-button';
                        shareBtn.innerHTML =
                            '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>'
                            + 'Share';
                        shareBtn.addEventListener('click', function () {
                            navigator.share({ title: 'My Whisky Blend', url: shareUrl });
                        });
                        actions.appendChild(shareBtn);
                    }

                    actions.insertBefore(box, actions.firstChild);
                    ui.appendChild(actions);

                } else {
                    heading.textContent = 'Bottle options';
                    sub.textContent = 'There are a few different bottles we can offer, but first you need to decide what to fill it with.';
                    var btn = document.createElement('a');
                    btn.href = 'create.html';
                    btn.className = 'wb-button wb-primary-button';
                    btn.textContent = 'Create something';
                    btn.style.marginTop = '24px';
                    sub.parentNode.insertBefore(btn, sub.nextSibling);
                    document.getElementById('wb-blendcode-panel').style.display = 'none';
                }
            })();
        </script>

    </body>
</html>
