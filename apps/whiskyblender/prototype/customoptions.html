        <script>
            function includeHTML() {
                var z, i, elmnt, file, xhttp;
                /*loop through a collection of all HTML elements:*/
                z = document.getElementsByTagName("*");
                for (i = 0; i < z.length; i++) {
                    elmnt = z[i];
                    /*search for elements with a certain attribute:*/
                    file = elmnt.getAttribute("w3-include-html");
                    if (file) {
                        /*make an HTTP request using the attribute value as the file name:*/
                        xhttp = new XMLHttpRequest();
                        xhttp.onreadystatechange = function () {
                            if (this.readyState == 4) {
                                if (this.status == 200) {
                                    elmnt.innerHTML = this.responseText;
                                }
                                if (this.status == 404) {
                                    elmnt.innerHTML = "Page not found.";
                                }
                                /*remove the attribute, and call this function once more:*/
                                elmnt.removeAttribute("w3-include-html");
                                includeHTML();
                            }
                        };
                        xhttp.open("GET", file, true);
                        xhttp.send();
                        /*exit the function:*/
                        return;
                    }
                }
            }
        </script>

        <script src="data/custom-products.js"></script>
        <script>
            (function () {
                var blend   = new URLSearchParams(window.location.search).get('blend') || '';
                var suffix  = blend ? '&blend=' + blend : '';
                var grid    = document.getElementById('custom-grid');
                var products = window.WB_CUSTOM_PRODUCTS || {};

                Object.keys(products).forEach(function (handle) {
                    var p    = products[handle];
                    var href = 'custom-product.html?handle=' + handle + suffix;
                    var soldOutClass = p.soldOut ? ' wb-soldout' : '';
                    var badge = p.soldOut ? '<div class="wb-soldoutbadge">Sold out</div>' : '';

                    var li = document.createElement('li');
                    li.className = 'wb-productcell';
                    li.innerHTML =
                        '<div class="wb-productitem' + soldOutClass + '" onclick="location.href=\'' + href + '\'">'
                        + '<div class="wb-productmedia">'
                        + '<div class="wb-productimage"><img src="' + p.image + '" alt="' + p.title + '" /></div>'
                        + '<div class="wb-productbadge">' + badge + '</div>'
                        + '</div>'
                        + '<div class="wb-productcontent"><div class="wb-productinfo">'
                        + '<h3 class="wb-producttitle wb-tiny-heading"><a href="' + href + '">' + p.title + '</a></h3>'
                        + '<div class="wb-productdetails"><div class="wb-productcosts">'
                        + '<div class="wb-product-price">' + p.price + '</div>'
                        + '</div></div>'
                        + '</div></div>'
                        + '</div>';
                    grid.appendChild(li);
                });
            })();
        </script>
