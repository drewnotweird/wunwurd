            content="Great tasting, unique and personalised whisky gifts. For that special occasion, or just a wee treat for yersel." />

        <meta name="twitter:site" content="@whisky_blender" />
        <meta name="twitter:title" content="Whisky Blender | Shop" />
        <meta name="twitter:image:src" content="images/covers/wb-index.jpg" />

            content="Great tasting, unique and personalised whisky gifts. For that special occasion, or just a wee treat for yersel." />

        <!-- Data layer -->
        <script src="data/products.js"></script>
        <script src="data/collections.js"></script>

        <script>
            function includeHTML() {
                var z, i, elmnt, file, xhttp;
                z = document.getElementsByTagName("*");
                for (i = 0; i < z.length; i++) {
                    elmnt = z[i];
                    file = elmnt.getAttribute("w3-include-html");
                    if (file) {
                        xhttp = new XMLHttpRequest();
                        xhttp.onreadystatechange = function () {
                            if (this.readyState == 4) {
                                if (this.status == 200) { elmnt.innerHTML = this.responseText; }
                                if (this.status == 404) { elmnt.innerHTML = "Page not found."; }
                                elmnt.removeAttribute("w3-include-html");
                                includeHTML();
                            }
                        };
                        xhttp.open("GET", file, true);
                        xhttp.send();
                        return;
                    }
                }
            }
        </script>
    </head>
    <body>
        <div w3-include-html="wb-header.html"></div>
        <main>
            <section class="wb-first-item">
                <div class="wb-container">
                    <div class="wb-padding">
                        <h1 class="wb-medium-heading">Shop</h1>
                        <form class="wb-bottle-form" id="shop-filters"></form>
                        <ul class="wb-productsgrid wb-tightergrid" id="shop-grid"></ul>
                    </div>
                </div>
            </section>
        </main>
        <div w3-include-html="wb-footer.html"></div>

        <script>
            (function () {
                var products   = window.WB_PRODUCTS   || {};
                var collections = window.WB_COLLECTIONS || {};
                var shopConfig  = window.WB_SHOP_CONFIG  || { filters: [] };

                // ── Determine active filter ───────────────────────────────────────
                var params      = new URLSearchParams(window.location.search);
                var activeFilter = params.get('filter') || 'featured';

                // ── Build ordered filter list: featured … config filters … sale ──
                var filterHandles = ['featured'].concat(shopConfig.filters).concat(['sale']);

                // ── Render filter tabs ────────────────────────────────────────────
                var filtersEl = document.getElementById('shop-filters');
                filterHandles.forEach(function (handle) {
                    var label = handle === 'sale' ? 'Sale'
                              : (collections[handle] ? collections[handle].title : handle);
                    var href  = 'shop.html?filter=' + handle;
                    var isActive = handle === activeFilter;

                    var span = document.createElement('span');
                    span.className = 'wb-radio';
                    span.innerHTML =
                        '<input type="radio" name="wb-filter" id="filter-' + handle + '"'
                        + (isActive ? ' checked' : '') + ' />'
                        + '<label for="filter-' + handle + '" onclick="location.href=\'' + href + '\'">'
                        + label + '</label>';
                    filtersEl.appendChild(span);
                });

                // ── Resolve product handles for active filter ─────────────────────
                var handles;
                if (activeFilter === 'sale') {
                    // All products with a sale price, in products.js order
                    handles = Object.keys(products).filter(function (h) {
                        return products[h].comparePrice !== null;
                    });
                } else if (collections[activeFilter] && collections[activeFilter].products) {
                    handles = collections[activeFilter].products;
                } else {
                    // Fallback: all products
                    handles = Object.keys(products);
                }

                // ── Render product grid ───────────────────────────────────────────
                var grid = document.getElementById('shop-grid');

                function renderProduct(handle) {
                    var product = products[handle];
                    if (!product) return;

                    var soldOutClass = product.soldOut ? ' wb-soldout' : '';
                    var badgeHtml = product.soldOut
                        ? '<div class="wb-soldoutbadge">Sold out</div>'
                        : (product.badge === 'Sale' ? '<div class="wb-salebadge">Sale</div>' : '');
                    var priceHtml = product.comparePrice
                        ? '<div class="wb-product-notprice"><s>' + product.comparePrice + '</s></div>'
                          + '<div class="wb-product-price">' + product.price + '</div>'
                        : '<div class="wb-product-price">' + product.price + '</div>';
                    var href = 'product.html?handle=' + handle;

                    var li = document.createElement('li');
                    li.className = 'wb-productcell';
                    li.innerHTML =
                        '<div class="wb-productitem' + soldOutClass + '" onclick="location.href=\'' + href + '\'">'
                        + '<div class="wb-productmedia">'
                        + '<div class="wb-productimage"><img src="' + product.images[0] + '" alt="' + product.title + '" /></div>'
                        + '<div class="wb-productbadge">' + badgeHtml + '</div>'
                        + '</div>'
                        + '<div class="wb-productcontent"><div class="wb-productinfo">'
                        + '<h3 class="wb-producttitle wb-tiny-heading"><a href="' + href + '">' + product.title + '</a></h3>'
                        + '<div class="wb-productdetails"><div class="wb-productcosts">' + priceHtml + '</div></div>'
                        + '</div></div>'
                        + '</div>';
                    grid.appendChild(li);
                }

                handles.forEach(renderProduct);

                includeHTML();
            })();
        </script>
    </body>
</html>
