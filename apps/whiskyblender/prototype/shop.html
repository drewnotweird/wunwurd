<!doctype html>
<html lang="en">
    <head>
        <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
        <meta name="theme-color" content="#000000" />
        <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0" />

        <title>Whisky Blender | Shop</title>

        <link href="https://fonts.googleapis.com/css?family=Raleway:400,600,700" rel="stylesheet" />
        <link rel="stylesheet" type="text/css" href="css/wb-base.css" />
        <link rel="stylesheet" type="text/css" href="css/wb-global.css" />
        <link rel="stylesheet" type="text/css" href="css/wb-fonts.css" />
        <link rel="stylesheet" type="text/css" href="css/wb-header.css" />
        <link rel="stylesheet" type="text/css" href="css/wb-footer.css" />
        <link rel="stylesheet" type="text/css" href="css/wb-products.css" />
        <link rel="icon" type="image/png" sizes="600x600" href="images/wb-favicon.png" />

        <meta content="Andrews of Bothwell" name="author" />
        <meta content="all,follow,index" name="robots" />
        <meta
            content="Great tasting, unique and personalised whisky gifts. For that special occasion, or just a wee treat for yersel."
            name="description" />
        <meta property="og:title" content="Whisky Blender | Shop" />
        <meta property="og:type" content="website" />
        <meta property="og:image" content="images/covers/wb-index.jpg" />
        <meta property="og:site_name" content="Whisky Blender" />
        <meta property="og:url" content="https://www.whiskyblender.com/shop" />
        <meta
            property="og:description"
            content="Great tasting, unique and personalised whisky gifts. For that special occasion, or just a wee treat for yersel." />
        <meta property="fb:app_id" content="194489270627737" />
        <meta name="twitter:card" content="summary_large_image" />
        <meta name="twitter:site" content="@whisky_blender" />
        <meta name="twitter:title" content="Whisky Blender | Shop" />
        <meta name="twitter:image:src" content="images/covers/wb-index.jpg" />
        <meta
            name="twitter:description"
            content="Great tasting, unique and personalised whisky gifts. For that special occasion, or just a wee treat for yersel." />
        <meta name="twitter:creator" content="whisky_blender" />
        <meta name="twitter:domain" content="https://www.whiskyblender.com" />

        <!-- Data layer -->
        <script src="data/products.js"></script>
        <script src="data/collections.js"></script>

        <script src="js/wb-init.js"></script>
    </head>
    <body>
        <div w3-include-html="wb-header.html"></div>
        <main>
            <section class="wb-first-item">
                <div class="wb-container">
                    <div class="wb-padding">
                        <h1 class="wb-medium-heading">Shop</h1>
                        <form class="wb-bottle-form" id="shop-filters"></form>
                        <ul class="wb-productsgrid wb-tightergrid" id="shop-grid"></ul>
                    </div>
                </div>
            </section>
        </main>
        <div w3-include-html="wb-footer.html"></div>

        <style>
            #shop-grid {
                transition: opacity 0.2s ease;
            }
            #shop-grid.wb-fading {
                opacity: 0;
            }
        </style>

        <script>
            (function () {
                var products    = window.WB_PRODUCTS    || {};
                var collections = window.WB_COLLECTIONS || {};
                var shopConfig  = window.WB_SHOP_CONFIG  || { filters: [] };

                // ── Build ordered filter list: featured … config filters … sale ──
                var filterHandles = ['featured'].concat(shopConfig.filters).concat(['sale']);

                // ── Render filter tabs ────────────────────────────────────────────
                var filtersEl = document.getElementById('shop-filters');
                filterHandles.forEach(function (handle) {
                    var label = handle === 'sale' ? 'Sale'
                              : (collections[handle] ? collections[handle].title : handle);

                    var span = document.createElement('span');
                    span.className = 'wb-radio';
                    span.innerHTML =
                        '<input type="radio" name="wb-filter" id="filter-' + handle + '" value="' + handle + '" />'
                        + '<label for="filter-' + handle + '">' + label + '</label>';
                    filtersEl.appendChild(span);
                });

                // ── Resolve product handles for a given filter ────────────────────
                function getHandles(filter) {
                    if (filter === 'sale') {
                        return Object.keys(products).filter(function (h) {
                            return products[h].comparePrice !== null;
                        });
                    } else if (collections[filter] && collections[filter].products) {
                        return collections[filter].products;
                    }
                    return Object.keys(products);
                }

                // ── Render product grid ───────────────────────────────────────────
                var grid = document.getElementById('shop-grid');

                function renderProduct(handle) {
                    var product = products[handle];
                    if (!product) return;

                    var soldOutClass = product.soldOut ? ' wb-soldout' : '';
                    var badgeHtml = product.soldOut
                        ? '<div class="wb-soldoutbadge">Sold out</div>'
                        : (product.badge === 'Sale' ? '<div class="wb-salebadge">Sale</div>' : '');
                    var priceHtml = product.comparePrice
                        ? '<div class="wb-product-notprice"><s>' + product.comparePrice + '</s></div>'
                          + '<div class="wb-product-price">' + product.price + '</div>'
                        : '<div class="wb-product-price">' + product.price + '</div>';
                    var href = product.href || ('product.html?handle=' + handle);

                    var li = document.createElement('li');
                    li.className = 'wb-productcell';
                    li.innerHTML =
                        '<div class="wb-productitem' + soldOutClass + '" onclick="location.href=\'' + href + '\'">'
                        + '<div class="wb-productmedia">'
                        + '<div class="wb-productimage"><img src="' + product.images[0] + '" alt="' + product.title + '" /></div>'
                        + '<div class="wb-productbadge">' + badgeHtml + '</div>'
                        + '</div>'
                        + '<div class="wb-productcontent"><div class="wb-productinfo">'
                        + '<h3 class="wb-producttitle wb-tiny-heading"><a href="' + href + '">' + product.title + '</a></h3>'
                        + '<div class="wb-productdetails"><div class="wb-productcosts">' + priceHtml + '</div></div>'
                        + '</div></div>'
                        + '</div>';
                    grid.appendChild(li);
                }

                function applyFilter(filter, pushState) {
                    // Update radio checked state
                    filterHandles.forEach(function (h) {
                        var input = document.getElementById('filter-' + h);
                        if (input) input.checked = (h === filter);
                    });

                    // Update URL without reloading
                    if (pushState) {
                        var url = 'shop.html?filter=' + filter;
                        history.pushState({ filter: filter }, '', url);
                    }

                    // Fade out → swap → fade in
                    grid.classList.add('wb-fading');
                    setTimeout(function () {
                        grid.innerHTML = '';
                        getHandles(filter).forEach(renderProduct);
                        grid.classList.remove('wb-fading');
                    }, 200);
                }

                // ── Wire up filter clicks ─────────────────────────────────────────
                filtersEl.addEventListener('change', function (e) {
                    if (e.target && e.target.name === 'wb-filter') {
                        applyFilter(e.target.value, true);
                    }
                });

                // Handle browser back/forward
                window.addEventListener('popstate', function (e) {
                    var filter = (e.state && e.state.filter) || 'featured';
                    applyFilter(filter, false);
                });

                // ── Initial render ────────────────────────────────────────────────
                var params = new URLSearchParams(window.location.search);
                var initialFilter = params.get('filter') || 'featured';
                applyFilter(initialFilter, false);

                includeHTML();
            })();
        </script>
    </body>
</html>
