        <!-- Data layer -->
        <script src="data/collections.js"></script>

        <script>
            function includeHTML() {
                var z, i, elmnt, file, xhttp;
                z = document.getElementsByTagName("*");
                for (i = 0; i < z.length; i++) {
                    elmnt = z[i];
                    file = elmnt.getAttribute("w3-include-html");
                    if (file) {
                        xhttp = new XMLHttpRequest();
                        xhttp.onreadystatechange = function () {
                            if (this.readyState == 4) {
                                if (this.status == 200) {
                                    elmnt.innerHTML = this.responseText;
                                }
                                if (this.status == 404) {
                                    elmnt.innerHTML = "Page not found.";
                                }
                                elmnt.removeAttribute("w3-include-html");
                                includeHTML();
                            }
                        };
                        xhttp.open("GET", file, true);
                        xhttp.send();
                        return;
                    }
                }
            }
        </script>

    <body id="occasion-body">
        <div id="snow-include"></div>
        <div w3-include-html="wb-header.html"></div>
        <main id="occasion-main" style="display:none">
            <section>
                <div class="wb-container">
                    <div class="wb-imagebg" id="occasion-hero">
                        <div class="wb-padding">
                            <h1 class="wb-medium-heading" id="occasion-title"></h1>
                            <p class="wb-collection-sub">Give the gift of whisky</p>
                        </div>
                    </div>
                    <div class="wb-padding wb-collection-copy">
                        <p id="occasion-description"></p>
                        <div w3-include-html="wb-products.html"></div>
                    </div>
                </div>
            </section>
            <section class="wb-banded">
                <div w3-include-html="wb-createunique.html"></div>
            </section>
        </main>
        <div id="occasion-not-found" style="display:none; padding: 60px 24px; text-align:center;">
            <p>Occasion not found.</p>
        </div>
        <div w3-include-html="wb-footer.html"></div>

        <script>
            (function () {
                var params = new URLSearchParams(window.location.search);
                var handle = params.get('handle');
                var occasion = handle && window.WB_COLLECTIONS && window.WB_COLLECTIONS[handle];

                if (!occasion || occasion.template !== 'occasions') {
                    document.getElementById('occasion-not-found').style.display = 'block';
                    includeHTML();
                    return;
                }

                // Page title
                document.getElementById('page-title').textContent = 'Whisky Blender | ' + occasion.title;

                // Body class
                if (occasion.bodyClass) {
                    document.getElementById('occasion-body').className = occasion.bodyClass;
                }

                // Snow include (Christmas only)
                if (occasion.hasSnow) {
                    document.getElementById('snow-include').setAttribute('w3-include-html', 'wb-snow.html');
                }

                // Hero
                document.getElementById('occasion-hero').style.backgroundImage = 'url(' + occasion.coverImage + ')';
                document.getElementById('occasion-title').textContent = occasion.title;
                document.getElementById('occasion-description').textContent = occasion.description;

                document.getElementById('occasion-main').style.display = '';
                includeHTML();
            })();
        </script>
    </body>
