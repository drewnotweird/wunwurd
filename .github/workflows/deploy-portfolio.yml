name: Deploy Portfolio to Fasthosts

on:
  push:
    branches: [main]
    paths:
      - 'apps/portfolio/frontend/**'
      - '.github/workflows/deploy-portfolio.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: apps/portfolio/frontend
        run: npm install

      - name: Build
        working-directory: apps/portfolio/frontend
        run: npm run build

      - name: Deploy to drewnotweird.com via FTP
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
        run: |
          lftp -u "$FTP_USER,$FTP_PASS" "ftp://$FTP_HOST" <<EOF
          set ftp:passive-mode true
          set net:timeout 120
          set net:max-retries 5
          set net:reconnect-interval-base 5
          mirror -R --no-perms apps/portfolio/frontend/dist/ htdocs/
          bye
          EOF

      - name: Deploy to drewnotweird.co.uk via FTP
        env:
          FTP_HOST_COUK: ${{ secrets.FTP_HOST_COUK }}
          FTP_USER_COUK: ${{ secrets.FTP_USER_COUK }}
          FTP_PASS_COUK: ${{ secrets.FTP_PASS_COUK }}
        run: |
          lftp -u "$FTP_USER_COUK,$FTP_PASS_COUK" "ftp://$FTP_HOST_COUK" <<EOF
          set ftp:passive-mode true
          set net:timeout 120
          set net:max-retries 5
          set net:reconnect-interval-base 5
          mirror -R --no-perms apps/portfolio/frontend/dist/ htdocs/
          bye
          EOF
