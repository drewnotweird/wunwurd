name: Deploy Vague Space to Fasthosts

on:
  push:
    branches: [main]
    paths:
      - 'apps/vaguespace/frontend/**'
      - '.github/workflows/deploy-vaguespace.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: apps/vaguespace/frontend
        run: npm install

      - name: Build
        working-directory: apps/vaguespace/frontend
        env:
          VITE_BASE_PATH: /vaguespace/
        run: npm run build

      - name: Deploy to drewnotweird.com via FTP
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
        run: |
          python3 - <<'EOF'
          import ftplib, os, time

          RECONNECT_EVERY = 20

          def make_ftp(host, user, password):
              ftp = ftplib.FTP()
              ftp.connect(host, 21, timeout=60)
              ftp.login(user, password)
              ftp.set_pasv(True)
              return ftp

          def ftp_upload(host, user, password, local_dir, remote_dir):
              ftp = make_ftp(host, user, password)
              print(f"Connected to {host}")
              count = [0]

              def ensure_dir(path):
                  try:
                      ftp.mkd(path)
                  except ftplib.error_perm:
                      pass

              def upload_file(local_item, remote_item):
                  nonlocal ftp
                  if count[0] > 0 and count[0] % RECONNECT_EVERY == 0:
                      ftp.quit()
                      ftp = make_ftp(host, user, password)
                      print(f"Reconnected after {count[0]} files")
                  for attempt in range(3):
                      try:
                          with open(local_item, 'rb') as f:
                              ftp.storbinary(f'STOR {remote_item}', f, blocksize=65536)
                          count[0] += 1
                          return
                      except Exception as e:
                          print(f"  Attempt {attempt+1} failed: {e}")
                          time.sleep(2)
                          ftp = make_ftp(host, user, password)
                  print(f"  GAVE UP on {remote_item}")

              def upload_dir(local_path, remote_path):
                  ensure_dir(remote_path)
                  for item in sorted(os.listdir(local_path)):
                      local_item = os.path.join(local_path, item)
                      remote_item = f"{remote_path}/{item}"
                      if os.path.isdir(local_item):
                          upload_dir(local_item, remote_item)
                      else:
                          print(f"Uploading {remote_item}")
                          upload_file(local_item, remote_item)

              upload_dir(local_dir, remote_dir)
              ftp.quit()
              print(f"Done. Uploaded {count[0]} files.")

          ftp_upload(
              os.environ['FTP_HOST'],
              os.environ['FTP_USER'],
              os.environ['FTP_PASS'],
              'apps/vaguespace/frontend/dist',
              'htdocs/vaguespace',
          )
          EOF

      - name: Deploy to drewnotweird.co.uk via FTP
        env:
          FTP_HOST_COUK: ${{ secrets.FTP_HOST_COUK }}
          FTP_USER_COUK: ${{ secrets.FTP_USER_COUK }}
          FTP_PASS_COUK: ${{ secrets.FTP_PASS_COUK }}
        run: |
          python3 - <<'EOF'
          import ftplib, os, time

          RECONNECT_EVERY = 20

          def make_ftp(host, user, password):
              ftp = ftplib.FTP()
              ftp.connect(host, 21, timeout=60)
              ftp.login(user, password)
              ftp.set_pasv(True)
              return ftp

          def ftp_upload(host, user, password, local_dir, remote_dir):
              ftp = make_ftp(host, user, password)
              print(f"Connected to {host}")
              count = [0]

              def ensure_dir(path):
                  try:
                      ftp.mkd(path)
                  except ftplib.error_perm:
                      pass

              def upload_file(local_item, remote_item):
                  nonlocal ftp
                  if count[0] > 0 and count[0] % RECONNECT_EVERY == 0:
                      ftp.quit()
                      ftp = make_ftp(host, user, password)
                      print(f"Reconnected after {count[0]} files")
                  for attempt in range(3):
                      try:
                          with open(local_item, 'rb') as f:
                              ftp.storbinary(f'STOR {remote_item}', f, blocksize=65536)
                          count[0] += 1
                          return
                      except Exception as e:
                          print(f"  Attempt {attempt+1} failed: {e}")
                          time.sleep(2)
                          ftp = make_ftp(host, user, password)
                  print(f"  GAVE UP on {remote_item}")

              def upload_dir(local_path, remote_path):
                  ensure_dir(remote_path)
                  for item in sorted(os.listdir(local_path)):
                      local_item = os.path.join(local_path, item)
                      remote_item = f"{remote_path}/{item}"
                      if os.path.isdir(local_item):
                          upload_dir(local_item, remote_item)
                      else:
                          print(f"Uploading {remote_item}")
                          upload_file(local_item, remote_item)

              upload_dir(local_dir, remote_dir)
              ftp.quit()
              print(f"Done. Uploaded {count[0]} files.")

          ftp_upload(
              os.environ['FTP_HOST_COUK'],
              os.environ['FTP_USER_COUK'],
              os.environ['FTP_PASS_COUK'],
              'apps/vaguespace/frontend/dist',
              'htdocs/vaguespace',
          )
          EOF
