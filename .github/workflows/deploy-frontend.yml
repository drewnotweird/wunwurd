name: Deploy Frontend to Fasthosts

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: frontend
        run: npm install

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Deploy to Fasthosts via FTP
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
        run: |
          python3 - <<'EOF'
          import ftplib, os, sys

          host = os.environ['FTP_HOST']
          user = os.environ['FTP_USER']
          password = os.environ['FTP_PASS']

          ftp = ftplib.FTP()
          ftp.connect(host, 21, timeout=30)
          ftp.login(user, password)
          ftp.set_pasv(True)
          print(f"Connected to {host}")
          print(f"Current directory: {ftp.pwd()}")
          print(f"Directory listing: {ftp.nlst()}")

          local_dir = 'frontend/dist'
          remote_dir = 'htdocs/wunwurd'

          def ensure_dir(path):
              try:
                  ftp.mkd(path)
              except ftplib.error_perm:
                  pass  # already exists

          def upload_dir(local_path, remote_path):
              ensure_dir(remote_path)
              for item in sorted(os.listdir(local_path)):
                  local_item = os.path.join(local_path, item)
                  remote_item = f"{remote_path}/{item}"
                  if os.path.isdir(local_item):
                      upload_dir(local_item, remote_item)
                  else:
                      print(f"Uploading {remote_item}")
                      with open(local_item, 'rb') as f:
                          ftp.storbinary(f'STOR {remote_item}', f, blocksize=8192)

          upload_dir(local_dir, remote_dir)
          ftp.quit()
          print("Done.")
          EOF
