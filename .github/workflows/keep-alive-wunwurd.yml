name: Keep Wunwurd Backend Alive

on:
  schedule:
    - cron: '*/14 * * * *'  # every 14 minutes — Render sleeps after 15

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://drewnotweird.onrender.com/api/movies/trending?page=1)
          echo "Response: $STATUS"
