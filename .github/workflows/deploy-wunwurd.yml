name: Deploy Wunwurd to Fasthosts

on:
  push:
    branches: [main]
    paths:
      - 'apps/wunwurd/frontend/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: apps/wunwurd/frontend
        run: npm install

      - name: Build for /wunwurd/ path (drewnotweird.com and drewnotweird.co.uk)
        working-directory: apps/wunwurd/frontend
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_BASE_PATH: /wunwurd/
        run: npm run build

      - name: Deploy to drewnotweird.com via FTP
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
        run: |
          python3 - <<'EOF'
          import ftplib, os

          def ftp_upload(host, user, password, local_dir, remote_dir):
              ftp = ftplib.FTP()
              ftp.connect(host, 21, timeout=30)
              ftp.login(user, password)
              ftp.set_pasv(True)
              print(f"Connected to {host}")

              def ensure_dir(path):
                  try:
                      ftp.mkd(path)
                  except ftplib.error_perm:
                      pass

              def upload_dir(local_path, remote_path):
                  ensure_dir(remote_path)
                  for item in sorted(os.listdir(local_path)):
                      local_item = os.path.join(local_path, item)
                      remote_item = f"{remote_path}/{item}"
                      if os.path.isdir(local_item):
                          upload_dir(local_item, remote_item)
                      else:
                          print(f"Uploading {remote_item}")
                          with open(local_item, 'rb') as f:
                              ftp.storbinary(f'STOR {remote_item}', f, blocksize=8192)

              upload_dir(local_dir, remote_dir)
              ftp.quit()
              print("Done.")

          ftp_upload(
              os.environ['FTP_HOST'],
              os.environ['FTP_USER'],
              os.environ['FTP_PASS'],
              'apps/wunwurd/frontend/dist',
              'htdocs/wunwurd',
          )
          EOF

      - name: Deploy to drewnotweird.co.uk/wunwurd via FTP
        env:
          FTP_HOST_COUK: ${{ secrets.FTP_HOST_COUK }}
          FTP_USER_COUK: ${{ secrets.FTP_USER_COUK }}
          FTP_PASS_COUK: ${{ secrets.FTP_PASS_COUK }}
        run: |
          python3 - <<'EOF'
          import ftplib, os

          def ftp_upload(host, user, password, local_dir, remote_dir):
              ftp = ftplib.FTP()
              ftp.connect(host, 21, timeout=30)
              ftp.login(user, password)
              ftp.set_pasv(True)
              print(f"Connected to {host}")

              def ensure_dir(path):
                  try:
                      ftp.mkd(path)
                  except ftplib.error_perm:
                      pass

              def upload_dir(local_path, remote_path):
                  ensure_dir(remote_path)
                  for item in sorted(os.listdir(local_path)):
                      local_item = os.path.join(local_path, item)
                      remote_item = f"{remote_path}/{item}"
                      if os.path.isdir(local_item):
                          upload_dir(local_item, remote_item)
                      else:
                          print(f"Uploading {remote_item}")
                          with open(local_item, 'rb') as f:
                              ftp.storbinary(f'STOR {remote_item}', f, blocksize=8192)

              upload_dir(local_dir, remote_dir)
              ftp.quit()
              print("Done.")

          ftp_upload(
              os.environ['FTP_HOST_COUK'],
              os.environ['FTP_USER_COUK'],
              os.environ['FTP_PASS_COUK'],
              'apps/wunwurd/frontend/dist',
              'htdocs/wunwurd',
          )
          EOF

      - name: Build for / path (wunwurd.drewnotweird.co.uk subdomain)
        working-directory: apps/wunwurd/frontend
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_BASE_PATH: /
        run: npm run build

      - name: Deploy to wunwurd.drewnotweird.co.uk via FTP
        env:
          FTP_HOST_COUK: ${{ secrets.FTP_HOST_COUK }}
          FTP_USER_COUK: ${{ secrets.FTP_USER_COUK }}
          FTP_PASS_COUK: ${{ secrets.FTP_PASS_COUK }}
        run: |
          python3 - <<'EOF'
          import ftplib, os

          def ftp_upload(host, user, password, local_dir, remote_dir):
              ftp = ftplib.FTP()
              ftp.connect(host, 21, timeout=30)
              ftp.login(user, password)
              ftp.set_pasv(True)
              print(f"Connected to {host}")

              def ensure_dir(path):
                  try:
                      ftp.mkd(path)
                  except ftplib.error_perm:
                      pass

              def upload_dir(local_path, remote_path):
                  ensure_dir(remote_path)
                  for item in sorted(os.listdir(local_path)):
                      local_item = os.path.join(local_path, item)
                      remote_item = f"{remote_path}/{item}"
                      if os.path.isdir(local_item):
                          upload_dir(local_item, remote_item)
                      else:
                          print(f"Uploading {remote_item}")
                          with open(local_item, 'rb') as f:
                              ftp.storbinary(f'STOR {remote_item}', f, blocksize=8192)

              upload_dir(local_dir, remote_dir)
              ftp.quit()
              print("Done.")

          ftp_upload(
              os.environ['FTP_HOST_COUK'],
              os.environ['FTP_USER_COUK'],
              os.environ['FTP_PASS_COUK'],
              'apps/wunwurd/frontend/dist',
              'htdocs/wunwurd',
          )
          EOF
